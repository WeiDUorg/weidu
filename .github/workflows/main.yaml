name: main
on:
  push:
    branches:
    - devel
  pull_request:
concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true
jobs:
  build-nix:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: '.#packages.aarch64-darwin'
          - os: macos-15-intel
            target: '.#packages.x86_64-darwin'
          - os: ubuntu-24.04
            target: '.#packages.x86_64-linux'
          - os: ubuntu-24.04-arm
            target: '.#packages.aarch64-linux'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@main
      - uses: cachix/install-nix-action@master
        with:
          nix_path: nixpkgs=channel:nixos-25.05
      - run: |
          nix build ${{ matrix.target }}
  build-macos:
    strategy:
      matrix:
        include:
          - os: macos-latest
            include: /opt/homebrew/opt
            elkhound_name: mac-arm-elkhound
          - os: macos-15-intel
            include: /usr/local/opt
            elkhound_name: mac-elkhound
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@main
      - name: fetch elkhound
        run: |
          mkdir -p bin
          curl -Lv https://github.com/The-Mod-Elephant/elkhound/releases/download/1.0.2/${{ matrix.elkhound_name }} -o bin/elkhound
          chmod +x bin/elkhound
          ./bin/elkhound
      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ocaml-variants.4.14.2+options,ocaml-option-default-unsafe-string
      - name: Set-up Zip and Upx
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew install zip upx
      - name: build weidu
        run: |
          export PATH="$PATH:$PWD/bin"
          mkdir -p obj/x86_LINUX
          mkdir -p obj/.depend
          opam switch
          eval $(opam env)
          mv sample.Configuration Configuration
          make
          make osx_zip
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: WeiDU-Mac-*.zip
          if-no-files-found: error
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@main
      - name: fetch elkhound
        run: |
          mkdir -p bin
          curl -Lv https://github.com/The-Mod-Elephant/elkhound/releases/download/1.0.2/lin-elkhound -o bin/elkhound
          chmod +x bin/elkhound
          ./bin/elkhound
      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 4.08.1+default-unsafe-string
      - name: build weidu
        run: |
          export PATH="$PATH:$PWD/bin"
          mkdir -p obj/x86_LINUX
          mkdir -p obj/.depend
          opam switch
          eval $(opam env)
          mv sample.Configuration Configuration
          make
          make linux_zip
      - uses: actions/upload-artifact@v4
        with:
          name: ubuntu-latest
          path: WeiDU-Linux-*.zip
          if-no-files-found: error
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          submodules: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout the code
        uses: actions/checkout@main
      - name: fetch windows elkhound
        run: |
          curl -Lv https://github.com/The-Mod-Elephant/elkhound/releases/download/1.0.2/elkhound.exe -o elkhound.exe
      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ocaml-variants.4.14.2+options,ocaml-option-default-unsafe-string
      - name: Set-up Zip and Upx
        run: choco install upx zip
      - name: build weidu
        run: |
          mv elkhound.exe D:/a/weidu/weidu/_opam/bin/elkhound.exe
          opam switch
          (& opam env) -split '\r?\n' | ForEach-Object { Invoke-Expression $_ }
          mv sample.Configuration Configuration
          make
          make windows_zip
      - name: upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-latest
          path: WeiDU-Windows-*.zip
          if-no-files-found: error
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: cachix/install-nix-action@master
        with:
          nix_path: nixpkgs=channel:nixos-25.05
      - name: Build static files
        shell: 'nix develop -c bash -e {0}'
        run: |
          make -C doc
  release:
    name: release
    permissions:
      contents: write
    needs: [build-nix, build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_name == 'devel'
    steps:
      - uses: actions/checkout@main
      - name: download linux artifact
        uses: actions/download-artifact@main
        with:
          name: ubuntu-latest
          path: linux
      - name: download mac artifact
        uses: actions/download-artifact@main
        with:
          name: macos-15-intel
          path: macos
      - name: download mac artifact
        uses: actions/download-artifact@main
        with:
          name: macos-latest
          path: macos-arm
      - name: download windows artifact
        uses: actions/download-artifact@main
        with:
          name: windows-latest
          path: windows
      - run: |
          mv linux/*.zip .
          mv macos/*.zip .
          mv macos-arm/WeiDU-Mac-250.zip WeiDU-Mac-ARM-250.zip
          mv windows/*.zip .
      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@v1.20.0
        with:
          generateReleaseNotes: true
          artifacts: "*zip"
          prerelease: true
          name: nightly-${{ github.sha }}
