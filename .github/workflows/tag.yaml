name: tag
on:
  push:
    tags:
      - "*"
concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true
jobs:
  build-nix:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: '.#packages.aarch64-darwin'
            suffix: ''
          - os: macos-15-intel
            target: '.#packages.x86_64-darwin'
            suffix: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@main
      - uses: cachix/install-nix-action@master
        with:
          nix_path: nixpkgs=channel:nixos-25.05
      - run: |
          nix build ${{ matrix.target }}
      - uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.os }}
          path: result/WeiDU-Mac*.zip
          if-no-files-found: error
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@main
      - name: fetch elkhound
        run: |
          mkdir -p bin
          curl -Lv https://github.com/The-Mod-Elephant/elkhound/releases/download/1.0.0/lin-elkhound -o bin/elkhound
          chmod +x bin/elkhound
          ls -ltrah bin/
          ./bin/elkhound
      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 4.08.1+default-unsafe-string
      - name: build weidu
        run: |
          export PATH="$PATH:$PWD/bin"
          mkdir -p obj/x86_LINUX
          opam switch
          eval $(opam env)
          mv sample.Configuration Configuration
          make
          make linux_zip
      - uses: actions/upload-artifact@v4
        with:
          name: ubuntu-latest
          path: WeiDU-Linux-*.zip
          if-no-files-found: error
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout the code
        uses: actions/checkout@main
      - name: fetch windows elkhound
        run: |
          curl -Lv https://github.com/The-Mod-Elephant/elkhound/releases/download/1.0.0/old-elkhound.exe -o elkhound.exe
      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ocaml-variants.4.14.2+options,ocaml-option-default-unsafe-string
      - name: Set-up Zip and Upx
        run: choco install upx zip
      - name: build weidu
        run: |
          mv elkhound.exe D:/a/weidu/weidu/_opam/bin/elkhound.exe
          opam switch
          (& opam env) -split '\r?\n' | ForEach-Object { Invoke-Expression $_ }
          mv sample.Configuration Configuration
          make
          make windows_zip
      - name: upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-latest
          path: WeiDU-Windows-*.zip
          if-no-files-found: error
  release:
    name: release
    permissions:
      contents: write
    needs: [build-nix, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - name: download linux artifact
        uses: actions/download-artifact@main
        with:
          name: ubuntu-latest
          path: linux
      - name: download mac artifact
        uses: actions/download-artifact@main
        with:
          name: macos-15-intel
          path: macos
      - name: download mac artifact
        uses: actions/download-artifact@main
        with:
          name: macos-latest
          path: macos-arm
      - name: download windows artifact
        uses: actions/download-artifact@main
        with:
          name: windows-latest
          path: windows
      - run: |
          mv linux/*.zip .
          mv macos/*.zip .
          mv macos-arm/WeiDU-Mac-250.zip WeiDU-Mac-ARM-250.zip
          mv windows/*.zip .
      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@v1.20.0
        with:
          generateReleaseNotes: true
          artifacts: "*zip"
